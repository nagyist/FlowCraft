<svg id="my-svg" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 660.046875 450" style="max-width: 660.047px; background-color: transparent;" role="graphics-document document" aria-roledescription="pie"><style>#my-svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#000000;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:#552222;}#my-svg .error-text{fill:#552222;stroke:#552222;}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#666;stroke:#666;}#my-svg .marker.cross{stroke:#666;}#my-svg svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#my-svg p{margin:0;}#my-svg .pieCircle{stroke:black;stroke-width:2px;opacity:0.7;}#my-svg .pieOuterCircle{stroke:black;stroke-width:2px;fill:none;}#my-svg .pieTitleText{text-anchor:middle;font-size:25px;fill:#333;font-family:"trebuchet ms",verdana,arial,sans-serif;}#my-svg .slice{font-family:"trebuchet ms",verdana,arial,sans-serif;fill:#000000;font-size:17px;}#my-svg .legend text{fill:#333;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:17px;}#my-svg .node .neo-node{stroke:#999;}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node path{stroke:url(#my-svg-gradient);stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node .neo-line path{stroke:#999;filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g transform="translate(225,225)"><circle cx="0" cy="0" r="186" class="pieOuterCircle"/><path d="M0,-185A185,185,0,0,1,108.74,149.668L0,0Z" fill="#F4F4F4" class="pieCircle"/><path d="M108.74,149.668A185,185,0,0,1,-149.668,108.74L0,0Z" fill="#555" class="pieCircle"/><path d="M-149.668,108.74A185,185,0,0,1,-175.945,-57.168L0,0Z" fill="#BBB" class="pieCircle"/><path d="M-175.945,-57.168A185,185,0,0,1,-89.124,-162.117L0,0Z" fill="#777" class="pieCircle"/><path d="M-89.124,-162.117A185,185,0,0,1,0,-185L0,0Z" fill="#999" class="pieCircle"/><text transform="translate(131.95909163595255,-42.87610796952395)" class="slice" style="text-anchor: middle;">40%</text><text transform="translate(-21.705282024332025,137.04175725757537)" class="slice" style="text-anchor: middle;">25%</text><text transform="translate(-137.04175725757534,21.70528202433205)" class="slice" style="text-anchor: middle;">15%</text><text transform="translate(-106.9087124351408,-88.44257857763064)" class="slice" style="text-anchor: middle;">12%</text><text transform="translate(-34.50572184412367,-134.39091360659754)" class="slice" style="text-anchor: middle;">8%</text><text x="0" y="-200" class="pieTitleText">Traffic sources</text><g class="legend" transform="translate(2